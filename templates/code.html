<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Editor — EcDash</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#030712;--bg2:#0a0f1a;--card:#111827;--card2:#161f2e;
      --border:#1f2937;--accent:#6366f1;--accent2:#8b5cf6;--accent3:#a78bfa;
      --green:#10b981;--yellow:#f59e0b;--red:#ef4444;--text:#f9fafb;--muted:#9ca3af;
      --grad:linear-gradient(135deg,#6366f1,#8b5cf6,#a78bfa);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}

    /* ── Layout ── */
    .shell{display:flex;flex-direction:column;height:100vh;}

    /* ── Topbar ── */
    .topbar{display:flex;align-items:center;justify-content:space-between;height:52px;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px;}
    .topbar-left{display:flex;align-items:center;gap:12px;min-width:0;}
    .topbar-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
    .topbar-sep{color:var(--border);}
    .topbar-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.88rem;color:var(--muted);}
    .file-path{font-size:.8rem;color:var(--accent3);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px;}
    .topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .btn{padding:7px 14px;border-radius:8px;font-weight:600;font-size:.78rem;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
    .btn-primary{background:var(--grad);color:white;}
    .btn-primary:hover{opacity:.9;}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
    .btn-ghost:hover{border-color:var(--accent3);color:var(--text);}
    .btn-success{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#34d399;}
    .back-btn{display:flex;align-items:center;gap:5px;color:var(--muted);text-decoration:none;font-size:.78rem;font-weight:500;padding:6px 12px;border:1px solid var(--border);border-radius:8px;transition:all .2s;}
    .back-btn:hover{color:var(--text);border-color:var(--accent3);}

    /* ── Main area ── */
    .main{display:flex;flex:1;overflow:hidden;}

    /* ── Sidebar file tree ── */
    .sidebar{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
    .sidebar-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .sidebar-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
    .sidebar-search{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:.78rem;outline:none;margin:8px 14px;width:calc(100% - 28px);}
    .sidebar-search:focus{border-color:var(--accent);}
    .file-tree{flex:1;overflow-y:auto;padding:4px 0;}
    .tree-group{margin-bottom:2px;}
    .tree-dir{display:flex;align-items:center;gap:6px;padding:6px 14px;font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);cursor:pointer;user-select:none;}
    .tree-dir:hover{color:var(--text);}
    .tree-dir-icon{transition:transform .2s;font-size:.7rem;}
    .tree-dir.collapsed .tree-dir-icon{transform:rotate(-90deg);}
    .tree-files{overflow:hidden;}
    .tree-files.collapsed{display:none;}
    .tree-file{display:flex;align-items:center;gap:8px;padding:5px 14px 5px 24px;font-size:.8rem;cursor:pointer;color:var(--muted);transition:all .15s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tree-file:hover{color:var(--text);background:rgba(255,255,255,.03);}
    .tree-file.active{color:var(--accent3);background:rgba(99,102,241,.08);border-left-color:var(--accent);}
    .tree-file-icon{font-size:.85rem;flex-shrink:0;}

    /* ── Editor pane ── */
    .editor-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .editor-tabs{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;flex-shrink:0;}
    .editor-tab{display:flex;align-items:center;gap:6px;padding:8px 16px;font-size:.78rem;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;border-right:1px solid var(--border);white-space:nowrap;transition:all .15s;}
    .editor-tab:hover{color:var(--text);}
    .editor-tab.active{color:var(--text);border-bottom-color:var(--accent);background:var(--bg);}
    .editor-tab.modified{color:var(--yellow);}
    .tab-close{opacity:.4;margin-left:4px;font-size:.7rem;padding:1px 4px;border-radius:3px;}
    .tab-close:hover{opacity:1;background:rgba(255,255,255,.1);}
    .editor-wrap{flex:1;position:relative;}
    #monaco-editor{width:100%;height:100%;}

    /* ── Welcome screen ── */
    .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--muted);}
    .welcome-icon{font-size:3rem;opacity:.4;}
    .welcome-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;color:var(--muted);}
    .welcome-sub{font-size:.82rem;text-align:center;max-width:320px;line-height:1.6;}

    /* ── Status bar ── */
    .statusbar{height:24px;background:#1e1e2e;border-top:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 14px;flex-shrink:0;}
    .status-item{font-size:.7rem;color:#64748b;display:flex;align-items:center;gap:4px;}
    .status-item.ok{color:#34d399;}
    .status-item.warn{color:var(--yellow);}
    .status-item.err{color:#f87171;}
    #status-msg{margin-left:auto;}

    /* ── Toast ── */
    #toast{position:fixed;bottom:32px;right:24px;padding:10px 18px;border-radius:10px;font-size:.82rem;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
    #toast.show{opacity:1;}
    #toast.ok{background:rgba(16,185,129,.9);color:white;}
    #toast.err{background:rgba(239,68,68,.9);color:white;}

    /* ── Scrollbar ── */
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}
    ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2);}

    @media(max-width:700px){
      .sidebar{width:200px;}
      .file-path{display:none;}
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── Topbar ── -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">EcDash</span>
      <span class="topbar-sep">›</span>
      <span class="topbar-title">Code Editor</span>
      <span class="topbar-sep" id="path-sep" style="display:none">›</span>
      <span class="file-path" id="active-path"></span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost" onclick="formatDoc()" id="btn-format" style="display:none">⚡ Format</button>
      <button class="btn btn-primary" onclick="saveFile()" id="btn-save" style="display:none" title="Ctrl+S">💾 Save</button>
      <a href="/dashboard" class="back-btn">← Dashboard</a>
    </div>
  </div>

  <!-- ── Main ── -->
  <div class="main">

    <!-- ── Sidebar ── -->
    <div class="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-title">📁 Files</span>
        <span id="file-count" style="font-size:.7rem;color:var(--muted)"></span>
      </div>
      <input class="sidebar-search" id="search" placeholder="Search files…" oninput="filterTree(this.value)">
      <div class="file-tree" id="file-tree">
        <div style="padding:20px;text-align:center;color:var(--muted);font-size:.78rem">Loading…</div>
      </div>
    </div>

    <!-- ── Editor pane ── -->
    <div class="editor-pane">
      <div class="editor-tabs" id="editor-tabs"></div>
      <div class="editor-wrap" id="editor-wrap">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">💻</div>
          <div class="welcome-title">EcDash Code Editor</div>
          <div class="welcome-sub">Select a file from the panel to start editing. Changes are saved directly to the live app.</div>
        </div>
        <div id="monaco-editor" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- ── Status bar ── -->
  <div class="statusbar">
    <div class="status-item" id="status-lang">📄 —</div>
    <div class="status-item" id="status-lines">0 lines</div>
    <div class="status-item" id="status-cursor">Ln 1, Col 1</div>
    <div class="status-item" id="status-msg" style="margin-left:auto">Ready</div>
  </div>
</div>

<div id="toast"></div>

<!-- Monaco Editor CDN -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
let editor = null;
let allFiles = [];
let openTabs = {};      // path → { content, modified, model }
let activeTab = null;

// ── Init Monaco ───────────────────────────────────────────────────────────────
require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
require(['vs/editor/editor.main'], () => {
  // Dark theme matching EcDash
  monaco.editor.defineTheme('ecdash-dark', {
    base: 'vs-dark',
    inherit: true,
    rules: [
      { token: 'comment', foreground: '4a5568', fontStyle: 'italic' },
    ],
    colors: {
      'editor.background': '#030712',
      'editor.lineHighlightBackground': '#0a0f1a',
      'editorLineNumber.foreground': '#374151',
      'editorLineNumber.activeForeground': '#6366f1',
      'editor.selectionBackground': '#312e81',
      'editorCursor.foreground': '#a78bfa',
    }
  });

  editor = monaco.editor.create(document.getElementById('monaco-editor'), {
    theme: 'ecdash-dark',
    fontSize: 13,
    fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace",
    fontLigatures: true,
    minimap: { enabled: true, scale: 1 },
    wordWrap: 'off',
    scrollBeyondLastLine: false,
    renderWhitespace: 'selection',
    smoothScrolling: true,
    cursorBlinking: 'smooth',
    cursorSmoothCaretAnimation: 'on',
    tabSize: 2,
    insertSpaces: true,
    automaticLayout: true,
    formatOnPaste: true,
    bracketPairColorization: { enabled: true },
    suggest: { showKeywords: true },
    quickSuggestions: { other: true, comments: false, strings: true },
  });

  // Track cursor position
  editor.onDidChangeCursorPosition(e => {
    const { lineNumber, column } = e.position;
    document.getElementById('status-cursor').textContent = `Ln ${lineNumber}, Col ${column}`;
  });

  // Track modifications
  editor.onDidChangeModelContent(() => {
    if (!activeTab) return;
    const saved = openTabs[activeTab]?.savedContent;
    const current = editor.getValue();
    const modified = current !== saved;
    if (openTabs[activeTab]) openTabs[activeTab].modified = modified;
    updateTabUI(activeTab);
    document.getElementById('btn-save').style.display = modified ? '' : 'none';
  });

  // Ctrl+S to save
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, saveFile);

  loadFileTree();
});

// ── File Tree ─────────────────────────────────────────────────────────────────
async function loadFileTree() {
  try {
    const r = await fetch('/api/code/files');
    allFiles = await r.json();
    document.getElementById('file-count').textContent = allFiles.length + ' files';
    renderTree(allFiles);
  } catch(e) {
    document.getElementById('file-tree').innerHTML = '<div style="padding:16px;color:#f87171;font-size:.78rem">Failed to load files</div>';
  }
}

function extIcon(ext) {
  const map = {'.html':'🌐','.css':'🎨','.js':'⚡','.json':'📋','.py':'🐍','.md':'📝','.txt':'📄'};
  return map[ext] || '📄';
}

function getExt(path) {
  const m = path.match(/\.[^.]+$/);
  return m ? m[0] : '';
}

function renderTree(files) {
  const tree = {};
  for (const f of files) {
    const parts = f.path.replace(/\\/g, '/').split('/');
    const dir = parts[0];
    if (!tree[dir]) tree[dir] = [];
    tree[dir].push(f);
  }

  const el = document.getElementById('file-tree');
  el.innerHTML = '';
  for (const [dir, dirFiles] of Object.entries(tree)) {
    const group = document.createElement('div');
    group.className = 'tree-group';
    group.innerHTML = `
      <div class="tree-dir" onclick="toggleDir(this)">
        <span class="tree-dir-icon">▾</span>
        <span>${dir}/</span>
        <span style="margin-left:auto;font-size:.68rem;color:var(--muted)">${dirFiles.length}</span>
      </div>
      <div class="tree-files" id="dir-${dir}">
        ${dirFiles.map(f => {
          const name = f.path.replace(/\\/g, '/').split('/').slice(1).join('/');
          const ext = getExt(name);
          const icon = extIcon(ext);
          const sizeStr = f.size > 1024 ? (f.size/1024).toFixed(1)+'kb' : f.size+'b';
          return `<div class="tree-file" data-path="${f.path}" onclick="openFile('${f.path.replace(/'/g,"\\'")}')">
            <span class="tree-file-icon">${icon}</span>
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis">${name}</span>
            <span style="font-size:.65rem;color:var(--muted);flex-shrink:0">${sizeStr}</span>
          </div>`;
        }).join('')}
      </div>`;
    el.appendChild(group);
  }
}

function toggleDir(el) {
  el.classList.toggle('collapsed');
  const dir = el.querySelector('span:nth-child(2)').textContent.replace('/','');
  const files = document.getElementById('dir-' + dir);
  if (files) files.classList.toggle('collapsed');
}

function filterTree(q) {
  q = q.toLowerCase();
  const filtered = q ? allFiles.filter(f => f.path.toLowerCase().includes(q)) : allFiles;
  renderTree(filtered);
}

// ── Open / Switch Files ───────────────────────────────────────────────────────
async function openFile(path) {
  // Highlight in tree
  document.querySelectorAll('.tree-file').forEach(el => {
    el.classList.toggle('active', el.dataset.path === path);
  });

  // Already open — just switch
  if (openTabs[path]) {
    switchTab(path);
    return;
  }

  setStatus('Loading…', '');
  try {
    const r = await fetch('/api/code/file?path=' + encodeURIComponent(path));
    if (!r.ok) throw new Error('Not found');
    const d = await r.json();
    const ext = getExt(path);
    const langMap = {'.html':'html','.css':'css','.js':'javascript','.json':'json','.py':'python','.md':'markdown','.txt':'plaintext'};
    const lang = langMap[ext] || 'plaintext';
    const model = monaco.editor.createModel(d.content, lang);
    openTabs[path] = { model, savedContent: d.content, modified: false };
    addTab(path);
    switchTab(path);
    setStatus('Opened', 'ok');
  } catch(e) {
    setStatus('Failed to open file', 'err');
    toast('Could not open file', 'err');
  }
}

function switchTab(path) {
  activeTab = path;
  const tab = openTabs[path];
  editor.setModel(tab.model);

  // Show editor, hide welcome
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('monaco-editor').style.display = 'block';

  // Update topbar
  const name = path.replace(/\\/g, '/').split('/').pop();
  document.getElementById('active-path').textContent = path;
  document.getElementById('path-sep').style.display = '';

  // Update status bar
  const ext = getExt(path);
  const langMap = {'.html':'HTML','.css':'CSS','.js':'JavaScript','.json':'JSON','.py':'Python','.md':'Markdown','.txt':'Text'};
  document.getElementById('status-lang').textContent = (langMap[ext] || ext.toUpperCase() || '—');
  document.getElementById('status-lines').textContent = tab.model.getLineCount() + ' lines';

  // Save button
  document.getElementById('btn-save').style.display = tab.modified ? '' : 'none';
  document.getElementById('btn-format').style.display = ['html','css','js','.json'].includes(ext) ? '' : 'none';

  // Tab highlight
  document.querySelectorAll('.editor-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.path === path);
  });

  editor.focus();
}

function addTab(path) {
  const existing = document.querySelector(`.editor-tab[data-path="${path}"]`);
  if (existing) return;
  const name = path.replace(/\\/g, '/').split('/').pop();
  const icon = extIcon(getExt(path));
  const tab = document.createElement('div');
  tab.className = 'editor-tab';
  tab.dataset.path = path;
  tab.innerHTML = `<span>${icon}</span><span>${name}</span><span class="tab-close" onclick="closeTab(event,'${path.replace(/'/g,"\\'")}')" title="Close">✕</span>`;
  tab.onclick = (e) => { if (!e.target.classList.contains('tab-close')) switchTab(path); };
  document.getElementById('editor-tabs').appendChild(tab);
}

function updateTabUI(path) {
  const tab = document.querySelector(`.editor-tab[data-path="${path}"]`);
  if (!tab) return;
  tab.classList.toggle('modified', !!openTabs[path]?.modified);
  const nameEl = tab.querySelectorAll('span')[1];
  const name = path.replace(/\\/g, '/').split('/').pop();
  nameEl.textContent = openTabs[path]?.modified ? name + ' ●' : name;
}

function closeTab(e, path) {
  e.stopPropagation();
  if (openTabs[path]?.modified) {
    if (!confirm('Unsaved changes in ' + path.split('/').pop() + ' — discard?')) return;
  }
  openTabs[path]?.model?.dispose();
  delete openTabs[path];
  const tab = document.querySelector(`.editor-tab[data-path="${path}"]`);
  if (tab) tab.remove();

  // Switch to another tab or show welcome
  const remaining = Object.keys(openTabs);
  if (remaining.length) {
    switchTab(remaining[remaining.length - 1]);
  } else {
    activeTab = null;
    document.getElementById('welcome').style.display = 'flex';
    document.getElementById('monaco-editor').style.display = 'none';
    document.getElementById('active-path').textContent = '';
    document.getElementById('path-sep').style.display = 'none';
    document.getElementById('btn-save').style.display = 'none';
    document.getElementById('btn-format').style.display = 'none';
  }
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveFile() {
  if (!activeTab) return;
  const content = editor.getValue();
  document.getElementById('btn-save').textContent = '⏳ Saving…';
  try {
    const r = await fetch('/api/code/file', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: activeTab, content })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Save failed');
    openTabs[activeTab].savedContent = content;
    openTabs[activeTab].modified = false;
    updateTabUI(activeTab);
    document.getElementById('btn-save').style.display = 'none';
    setStatus('Saved ✓', 'ok');
    toast('Saved — ' + activeTab.split('/').pop(), 'ok');
  } catch(e) {
    setStatus('Save failed', 'err');
    toast('Save failed: ' + e.message, 'err');
  } finally {
    document.getElementById('btn-save').textContent = '💾 Save';
  }
}

// ── Format ────────────────────────────────────────────────────────────────────
function formatDoc() {
  editor?.getAction('editor.action.formatDocument')?.run();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = type === 'ok' ? '✅ ' + msg : '❌ ' + msg;
  el.className = 'show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.className = '', 2800);
}

function setStatus(msg, cls='') {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status-item' + (cls ? ' ' + cls : '');
}

// Update line count when model changes
setInterval(() => {
  if (activeTab && openTabs[activeTab]) {
    const count = openTabs[activeTab].model?.getLineCount() || 0;
    document.getElementById('status-lines').textContent = count + ' lines';
  }
}, 2000);
</script>
</body>
</html>
