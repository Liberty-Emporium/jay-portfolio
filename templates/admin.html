<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin - Change Photo</title>
    <style>
    html,body{overflow-x:hidden!important;max-width:100%;}
    img{max-width:100%;height:auto;}
    @media(max-width:768px){table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;}input,select,textarea{font-size:16px!important;}}

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: white; min-height: 100vh; padding: 2rem; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { margin-bottom: 2rem; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, textarea { width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid #333; background: #0f0f0f; color: white; font-size: 1rem; }
        input:focus { outline: none; border-color: #6366f1; }
        .preview { font-size: 5rem; text-align: center; padding: 2rem; background: #1a1a1a; border-radius: 12px; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; }
        .preview img { width: 150px; height: 150px; object-fit: cover; border-radius: 50%; }
        .btn { background: #6366f1; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .btn:hover { background: #5558e3; }
        .btn-secondary { background: #333; }
        .msg { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .msg-success { background: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Portfolio Admin</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="msg msg-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <div class="card">
            <form method="POST" enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label>Current Preview</label>
                    <div class="preview" id="preview">
                        {% if config.photo_url %}
                        <img src="{{ config.photo_url }}" alt="Profile">
                        {% else %}
                        {{ config.photo }}
                        {% endif %}
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Photo / Emoji (fallback)</label>
                    <input type="text" name="photo" id="photo" value="{{ config.photo }}" placeholder="👨‍💻 or any emoji">
                </div>
                
                <div class="form-group">
                    <label>Or use an image URL</label>
                    <input type="url" name="photo_url" id="photo_url" value="{{ config.photo_url }}" placeholder="https://example.com/photo.jpg">
                </div>
                
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" name="name" value="{{ config.name }}">
                </div>
                
                <div class="form-group">
                    <label>Tagline</label>
                    <input type="text" name="tagline" value="{{ config.tagline }}">
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ config.email }}">
                </div>
                
                <button type="submit" class="btn">💾 Save Changes</button>
                <a href="/" class="btn btn-secondary" style="margin-left: 0.5rem; text-decoration: none;">👁 View Site</a>
            </form>
        </div>
    </div>
</body>
</html>
