<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexander AI Digital — Business Card</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
    html,body{overflow-x:hidden!important;max-width:100%;}
    img{max-width:100%;height:auto;}
    @media(max-width:768px){table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;}input,select,textarea{font-size:16px!important;}}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #0a0a1a;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2.5rem;
  padding: 3rem 1rem;
}

.section-label {
  color: #334155;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
  text-align: center;
}

/* Standard business card: 3.5in x 2in */
.card {
  width: 440px;
  height: 248px;
  border-radius: 16px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.7);
}

/* ─── FRONT ─────────────────────────────────── */
.front {
  background: #0f172a;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 26px 32px 22px;
}

/* Top-right glow */
.front::before {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 240px; height: 240px;
  background: radial-gradient(circle, rgba(99,102,241,0.3) 0%, transparent 65%);
  border-radius: 50%;
  pointer-events: none;
}

/* Bottom accent bar */
.front::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, #6366f1, #818cf8, #6366f1, transparent);
}

.brand-row {
  display: flex;
  align-items: center;
  gap: 9px;
  position: relative;
  z-index: 1;
}

.dot {
  width: 9px; height: 9px;
  background: #6366f1;
  border-radius: 50%;
  box-shadow: 0 0 14px rgba(99,102,241,0.9);
  flex-shrink: 0;
}

.brand-text {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #818cf8;
}

.name-block { position: relative; z-index: 1; }

.full-name {
  font-size: 1.75rem;
  font-weight: 900;
  color: #ffffff;
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: 5px;
}

.title-line {
  font-size: 0.7rem;
  font-weight: 500;
  color: #475569;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.contact-row {
  display: flex;
  flex-direction: column;
  gap: 5px;
  position: relative;
  z-index: 1;
}

.contact-line {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.68rem;
  color: #94a3b8;
}

.contact-line .dot-sm {
  width: 4px; height: 4px;
  background: #6366f1;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ─── BACK ──────────────────────────────────── */
.back {
  background: linear-gradient(135deg, #0f172a 0%, #1a1040 60%, #0f172a 100%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 36px;
  gap: 24px;
}

/* Subtle grid pattern */
.back::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
  background-size: 24px 24px;
}

/* Bottom accent */
.back::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, #6366f1, #818cf8, #6366f1, transparent);
}

/* Photo circle */
.photo-wrap {
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}

.photo-ring {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  padding: 3px;
  background: linear-gradient(135deg, #6366f1, #818cf8, #4f46e5);
  box-shadow: 0 0 30px rgba(99,102,241,0.5);
}

.photo-inner {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  overflow: hidden;
  background: #1e293b;
  display: flex;
  align-items: center;
  justify-content: center;
}

.photo-inner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
}

/* Brand block on back */
.back-brand {
  flex: 1;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.back-logo-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.back-dot {
  width: 10px; height: 10px;
  background: #6366f1;
  border-radius: 50%;
  box-shadow: 0 0 12px rgba(99,102,241,0.8);
}

.back-company {
  font-size: 1rem;
  font-weight: 800;
  color: white;
  letter-spacing: -0.02em;
}

.back-company span { color: #818cf8; }

.back-tagline {
  font-size: 0.65rem;
  color: #475569;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 500;
  line-height: 1.6;
}

.back-divider {
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, #6366f1, transparent);
  border-radius: 2px;
}

.back-services {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.service-item {
  font-size: 0.62rem;
  color: #64748b;
  display: flex;
  align-items: center;
  gap: 6px;
}

.service-dot {
  width: 3px; height: 3px;
  background: #6366f1;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ─── PRINT BUTTON ───────────────────────────── */
.btn-row {
  display: flex;
  gap: 1rem;
  margin-top: 0.5rem;
}

.btn {
  padding: 0.65rem 1.75rem;
  border: none;
  border-radius: 10px;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
}

.btn-primary { background: #6366f1; color: white; }
.btn-primary:hover { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(99,102,241,0.4); }
.btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
.btn-secondary:hover { background: #334155; color: white; }

.hint { color: #334155; font-size: 0.7rem; margin-top: 0.5rem; text-align: center; }

@media print {
  body { background: white; padding: 0; }
  .btn-row, .hint, .section-label { display: none; }
  .card { box-shadow: none; }
}
</style>
</head>
<body>

<div class="section-label">Front</div>
<div class="card front">
  <div class="brand-row">
    <div class="dot"></div>
    <div class="brand-text">Alexander AI Digital</div>
  </div>

  <div class="name-block">
    <div class="full-name">Jay Alexander</div>
    <div class="title-line">Founder &amp; CEO</div>
  </div>

  <div class="contact-row">
    <div class="contact-line">
      <div class="dot-sm"></div>
      alexanderaidigital.com
    </div>
    <div class="contact-line">
      <div class="dot-sm"></div>
      jay@alexanderaidigital.com
    </div>
    <div class="contact-line">
      <div class="dot-sm"></div>
      AI-Powered SaaS Solutions
    </div>
  </div>
</div>

<div class="section-label">Back</div>
<div class="card back">
  <div class="photo-wrap">
    <div class="photo-ring">
      <div class="photo-inner">
        <img src="{{ jay_photo_b64 }}" alt="Jay Alexander">
      </div>
    </div>
  </div>

  <div class="back-brand">
    <div class="back-logo-row">
      <div class="back-dot"></div>
      <div class="back-company">Alexander <span>AI</span> Digital</div>
    </div>
    <div class="back-divider"></div>
    <div class="back-tagline">Intelligent Software.<br>Built to Scale.</div>
    <div class="back-services">
      <div class="service-item"><div class="service-dot"></div>SaaS Platforms</div>
      <div class="service-item"><div class="service-dot"></div>AI Integration</div>
      <div class="service-item"><div class="service-dot"></div>Business Automation</div>
    </div>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-primary" onclick="window.print()">🖨️ Print / Save PDF</button>
  <button class="btn btn-secondary" onclick="document.body.style.background='white'">☀️ Light Mode</button>
</div>
<div class="hint">Standard 3.5" × 2" business card size</div>

</body>
</html>
