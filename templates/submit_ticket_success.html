<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Submitted</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',system-ui,sans-serif;background:#030712;color:#f9fafb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:#111827;border:1px solid #1f2937;border-radius:16px;padding:40px;width:100%;max-width:420px;text-align:center;}
    .icon{font-size:3rem;margin-bottom:16px;}
    h1{font-size:1.4rem;font-weight:700;margin-bottom:10px;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    p{font-size:.88rem;color:#9ca3af;line-height:1.7;}
  </style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Ticket Submitted!</h1>
  <p>Your support request for <strong style="color:#f9fafb">{{ app_name }}</strong> has been received.<br><br>We'll get back to you as soon as possible. Thank you!</p>
</div>
</body>
</html>
